---
# Lock/Unlock Deps Pattern
#
# Two often conflicting goals resolved!
#
#  - unlocked_deps.yml
#    - All runtime & dev dependencies, but does not have a `gemfiles/*.gemfile.lock` committed
#    - Uses an Appraisal2 "unlocked_deps" gemfile, and the current MRI Ruby release
#    - Know when new dependency releases will break local dev with unlocked dependencies
#    - Broken workflow indicates that new releases of dependencies may not work
#
#  - locked_deps.yml
#    - All runtime & dev dependencies, and has a `Gemfile.lock` committed
#    - Uses the project's main Gemfile, and the current MRI Ruby release
#    - Matches what contributors and maintainers use locally for development
#    - Broken workflow indicates that a new contributor will have a bad time
#
name: Deps Locked

permissions:
  contents: read

env:
  # Running coverage, but not validating minimum coverage,
  #   because it would be redundant with the coverage workflow.
  # Also we can validate all output formats without breaking CodeCov,
  #   since we aren't submitting these reports anywhere.
  K_SOUP_COV_MIN_BRANCH: 70
  K_SOUP_COV_MIN_LINE: 80
  K_SOUP_COV_MIN_HARD: false
  K_SOUP_COV_FORMATTERS: "html,xml,rcov,lcov,json,tty"
  K_SOUP_COV_DO: true
  K_SOUP_COV_MULTI_FORMATTERS: true
  K_SOUP_COV_COMMAND_NAME: "Test Coverage"
  ORE_DEBUG: true

on:
  push:
    branches:
      - 'main'
      - '*-stable'
    tags:
      - '!*' # Do not execute on tags
  pull_request:
    branches:
      - '*'
  # Allow manually triggering the workflow.
  workflow_dispatch:

# Cancels all previous workflow runs for the same branch that have not yet completed.
concurrency:
  # The concurrency group contains the workflow name and the branch name.
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    if: "!contains(github.event.commits[0].message, '[ci skip]') && !contains(github.event.commits[0].message, '[skip ci]')"
    name: Default rake task w/ main Gemfile.lock ${{ matrix.name_extra || '' }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    env:
      # $BUNDLE_GEMFILE must be set at job level, so it is set for all steps
      BUNDLE_GEMFILE: ${{ github.workspace }}/${{ matrix.gemfile }}.gemfile
      # tree-sitter library paths for FFI/MRI/Rust backend compatibility
      LD_LIBRARY_PATH: "/usr/local/lib:/usr/lib/x86_64-linux-gnu:/usr/lib"
      TREE_SITTER_RUNTIME_LIB: "/usr/lib/x86_64-linux-gnu/libtree-sitter.so.0"
      TREE_SITTER_TOML_PATH: "/usr/local/lib/libtree-sitter-toml.so"
      # Force Nokogiri to use system libraries instead of bundled ones
      BUNDLE_FORCE_RUBY_PLATFORM: "false"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ruby <whichever version is current, e.g., 3.4 as of 2025-07-12>
          - ruby: "ruby"
            exec_cmd: "rake"
            gemfile: "Locked"
            rubygems: latest
            bundler: latest
            experimental: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tree-sitter and toml grammar
        uses: kettle-rb/ts-grammar-action@main
        with:
          setup-rust: "true"
          grammar-toml: "true"

      - name: Setup Ruby & Gems via rv & ore
        uses: appraisal-rb/setup-ruby-flash@main
        with:
          ruby-version: "${{ matrix.ruby }}"
          rubygems: "${{ matrix.rubygems }}"
          bundler: "${{ matrix.bundler }}"
          ore-install: true
          rv-git-ref: "main"
          ore-git-ref: "fix/bundle-path-handling"
          cache-version: "v3"

      - name: Diagnostic - Compare gemspec formats
        run: ruby bin/compare_gemspec_formats

      - name: Spy on Bundle Exec Environment
        continue-on-error: true
        run: |
          bundle exec ruby -e "
            puts '--- BUNDLE EXEC SPY ---'
            puts 'GEM_HOME=' + ENV['GEM_HOME'].to_s
            puts 'GEM_PATH=' + ENV['GEM_PATH'].to_s
            puts 'BUNDLE_BIN_PATH=' + ENV['BUNDLE_BIN_PATH'].to_s
            puts 'RUBYLIB=' + ENV['RUBYLIB'].to_s
            puts 'RUBYOPT=' + ENV['RUBYOPT'].to_s
            puts 'LOAD_PATH:'
            puts \$LOAD_PATH
            puts '-----------------------'
          "

      - name: Debug env before bundle exec
        run: |
          echo "--- bundle env ---"
          bundle env || true
          echo "--- ruby gem env ---"
          ruby -e "require 'rubygems'; puts 'Gem.dir=' + Gem.dir; puts 'Gem.path=' + Gem.path.join(':')"

      - name: Checks the kitchen sink via ${{ matrix.exec_cmd }}
        run: |
          echo "--- PRE-FLIGHT ENV (GEM_*, BUNDLE_*) ---"
          env | sort | grep -E '^(GEM_|BUNDLE_)' || true
          echo "--- PRE-FLIGHT bundle env ---"
          bundle env || true
          echo "--- PRE-FLIGHT ruby gem env ---"
          ruby -e "require 'rubygems'; puts 'Gem.dir=' + Gem.dir; puts 'Gem.path=' + Gem.path.join(':')"
          echo "--- PRE-FLIGHT bundle check ---"
          bundle check || true
          echo "--- PRE-FLIGHT bundler settings snapshot ---"
          ruby -e "require 'bundler'; puts 'Bundler.settings[:path]=' + Bundler.settings[:path].inspect; puts 'Bundler.settings[\"path.system\"]=' + Bundler.settings['path.system'].inspect; puts 'Bundler.bundle_path=' + Bundler.bundle_path.to_s; puts 'Bundler.rubygems.installed_specs=' + Bundler.rubygems.installed_specs.size.to_s"
          echo "--- PRE-FLIGHT rubygems spec snapshot ---"
          ruby -e "require 'rubygems'; puts 'Gem::Specification.stubs=' + Gem::Specification.stubs.size.to_s; %w[kettle-dev rake].each { |g| specs = Gem::Specification.stubs.select { |s| s.name == g }; puts g + ': ' + specs.map(&:full_name).join(', ') }"
          echo "--- PRE-FLIGHT rubygems spec dirs ---"
          ruby -e "require 'rubygems'; puts 'Gem::Specification.dirs=' + Gem::Specification.dirs.join(':')"
          echo "--- PRE-FLIGHT bundler definition specs ---"
          ruby -e "require 'bundler'; Bundler.definition.specs; puts 'Bundler.definition.specs ok'" || true
          echo "--- PRE-FLIGHT RUBYOPT -rbundler/setup ---"
          RUBYOPT="-rbundler/setup" ruby -e "require 'bundler'; puts 'Bundler.setup via RUBYOPT ok'" || true
          echo "--- PRE-FLIGHT ruby -rbundler/setup -S rake ---"
          ruby -rbundler/setup -S rake -T || true
          echo "--- PRE-FLIGHT bundle shim ---"
          ruby -e "require 'rubygems'; path = Gem.bin_path('bundler','bundle'); puts 'bundle path=' + path; puts File.read(path)" || true
          echo "--- PRE-FLIGHT bundle exec sanity (debug) ---"
          BUNDLE_DEBUG=1 BUNDLE_VERBOSE=1 bundle exec ruby -e "require 'bundler'; puts 'Bundler.default_gemfile=' + Bundler.default_gemfile.to_s; puts 'Bundler.default_lockfile=' + Bundler.default_lockfile.to_s" || true
          echo "--- PRE-FLIGHT bundler/setup sanity ---"
          BUNDLE_PATH="" ruby -rbundler/setup -e "require 'bundler'; puts 'Bundler.default_gemfile=' + Bundler.default_gemfile.to_s; puts 'Bundler.default_lockfile=' + Bundler.default_lockfile.to_s" || true
          echo "--- PRE-FLIGHT bundle exec env snapshot ---"
          bundle exec env | sort | grep -E '^(GEM_|BUNDLE_)' || true
          echo "--- PRE-FLIGHT bundle exec env snapshot (BUNDLER_ORIG_*) ---"
          bundle exec env | sort | grep -E '^(BUNDLER_ORIG_|GEM_|BUNDLE_)' || true
          echo "--- PRE-FLIGHT bundle exec rubygems/bundler snapshot ---"
          bundle exec ruby -e "require 'rubygems'; require 'bundler'; puts 'Gem.path=' + Gem.path.join(':'); puts 'Bundler.rubygems.installed_specs=' + Bundler.rubygems.installed_specs.size.to_s" || true
          echo "--- PRE-FLIGHT bundle exec rubygems spec dirs ---"
          bundle exec ruby -e "require 'rubygems'; puts 'Gem::Specification.dirs=' + Gem::Specification.dirs.join(':')"
          echo "--- PRE-FLIGHT bundle exec source flags ---"
          bundle exec ruby -e "require 'bundler'; sources = Bundler.definition.sources.rubygems_sources; sources.each { |s| allow_local = s.instance_variable_get(:@allow_local); allow_remote = s.instance_variable_get(:@allow_remote); allow_cached = s.instance_variable_get(:@allow_cached); remotes = s.remotes.map(&:to_s); puts 'source=' + s.to_s + ' allow_local=' + allow_local.to_s + ' allow_remote=' + allow_remote.to_s + ' allow_cached=' + allow_cached.to_s + ' remotes=' + remotes.join(',') }" || true
          echo "--- PRE-FLIGHT bundle exec stub counts ---"
          bundle exec ruby -e "require 'rubygems'; puts 'Gem::Specification.stubs=' + Gem::Specification.stubs.size.to_s; puts 'Gem::Specification.default_stubs=' + Gem::Specification.default_stubs.size.to_s" || true
          echo "--- PRE-FLIGHT bundle exec gem presence snapshot ---"
          bundle exec ruby -e "require 'rubygems'; require 'bundler'; specs = Bundler.rubygems.installed_specs; %w[kettle-dev rake bundler-audit].each { |g| hits = specs.select { |s| s.name == g }; hits.each { |s| path = s.full_gem_path; missing = s.respond_to?(:installation_missing?) ? s.installation_missing? : 'n/a'; puts g + ': ' + s.full_name + ' missing=' + missing.to_s + ' path=' + path } }" || true
          echo "--- PRE-FLIGHT bundle exec definition.specs ---"
          bundle exec ruby -e "require 'bundler'; begin; Bundler.definition.specs; puts 'Bundler.definition.specs ok (bundle exec)'; rescue => e; warn e.class.to_s + ': ' + e.message; warn e.backtrace.first(10).join(\"\\n\"); end" || true
          echo "--- PRE-FLIGHT bundle exec locked spec sources ---"
          bundle exec ruby -e "require 'bundler'; names = %w[kettle-dev rake rexml logger]; locked = Bundler.definition.instance_variable_get(:@locked_specs); names.each do |name| spec = locked[name]&.first; unless spec; puts name + ': locked spec missing'; next; end; src = spec.source; allow_local = src.instance_variable_get(:@allow_local) rescue 'n/a'; allow_remote = src.instance_variable_get(:@allow_remote) rescue 'n/a'; allow_cached = src.instance_variable_get(:@allow_cached) rescue 'n/a'; remotes = src.respond_to?(:remotes) ? src.remotes.map(&:to_s).join(',') : 'n/a'; matches = src.respond_to?(:specs) ? src.specs.search([name, spec.version]) : []; puts name + ': source=' + src.class.name + ' allow_local=' + allow_local.to_s + ' allow_remote=' + allow_remote.to_s + ' allow_cached=' + allow_cached.to_s + ' remotes=' + remotes + ' matches=' + matches.size.to_s; end" || true
          echo "--- PRE-FLIGHT bundle exec kernel_load probe ---"
          cat > .bundle_exec_probe <<'RUBY'
          #!/usr/bin/env ruby
          puts "bundle exec kernel_load probe ok"
          RUBY
          chmod +x .bundle_exec_probe
          bundle exec ./.bundle_exec_probe || true
          echo "--- PRE-FLIGHT bundle exec RUBYOPT trace setup ---"
          cat > .rubygems_preflight_trace.rb <<'RUBY'
          # frozen_string_literal: true
          $stdout.sync = true
          trace_file = ".rubygems_preflight_stubs.txt"
          sample_names = %w[
            kettle-dev rake bundler-audit appraisal2 rspec-core rspec backports
            simplecov unicode-emoji thor version_gem
          ]
          puts "--- RUBYOPT TRACE (pre Bundler.setup) ---"
          puts "RUBYOPT=#{ENV['RUBYOPT']}"
          puts "GEM_HOME=#{ENV['GEM_HOME']}"
          puts "GEM_PATH=#{ENV['GEM_PATH']}"
          begin
            require "rubygems"
            puts "Gem.platforms=#{Gem.platforms.join(',')}"
            puts "Gem::Platform.local=#{Gem::Platform.local}"
            puts "Gem.path=#{Gem.path.join(':')}"
            puts "Gem::Specification.dirs=#{Gem::Specification.dirs.join(':')}"
            puts "Gem::Specification.stubs=#{Gem::Specification.stubs.size}"
            sample_names.each do |name|
              stubs = Gem::Specification.stubs.select { |s| s.name == name }
              puts "#{name} stubs=#{stubs.map(&:full_name).join(',')}"
            end
            current = Gem::Specification.stubs.map(&:full_name).sort
            if File.exist?(trace_file)
              previous = File.read(trace_file).split("\n")
              removed = previous - current
              added = current - previous
              puts "stubs delta removed=#{removed.size} added=#{added.size}"
              puts "stubs removed sample=#{removed.first(10).join(',')}" unless removed.empty?
              puts "stubs added sample=#{added.first(10).join(',')}" unless added.empty?
            else
              File.write(trace_file, current.join("\n"))
              puts "stubs baseline written count=#{current.size}"
            end
          rescue => e
            warn "trace error: #{e.class}: #{e.message}"
          end
          puts "--- END RUBYOPT TRACE ---"
          RUBY
          echo "--- PRE-FLIGHT bundle exec ruby (RUBYOPT trace) ---"
          RUBYOPT="-r./.rubygems_preflight_trace.rb -rbundler/setup" bundle exec ruby -e "puts 'bundle exec ruby ok'" || true
          echo "--- PRE-FLIGHT bundle exec rake (RUBYOPT trace) ---"
          RUBYOPT="-r./.rubygems_preflight_trace.rb -rbundler/setup" bundle exec rake -T || true
          echo "--- PRE-FLIGHT bundle exec rake path ---"
          bundle exec ruby -e "require 'bundler'; path = Bundler.which('rake'); puts 'rake path=' + path.to_s; if path && File.exist?(path); puts File.read(path).lines.first(5).join; end" || true
          echo "--- PRE-FLIGHT bundle exec ruby -S rake ---"
          bundle exec ruby -S rake -T || true
          echo "--- PRE-FLIGHT manual bundle exec env replay ---"
          BUNDLE_BIN_PATH="$GEM_HOME/gems/bundler-4.0.5/exe/bundle" \
            BUNDLE_GEMFILE="$BUNDLE_GEMFILE" \
            BUNDLE_LOCKFILE="$BUNDLE_GEMFILE.lock" \
            RUBYOPT="-rbundler/setup" \
            ruby -e "require 'bundler'; puts 'Bundler.setup via manual env ok'" || true
          echo "--- PRE-FLIGHT manual env replay (no BUNDLE_LOCKFILE) ---"
          BUNDLE_BIN_PATH="$GEM_HOME/gems/bundler-4.0.5/exe/bundle" \
            BUNDLE_GEMFILE="$BUNDLE_GEMFILE" \
            BUNDLE_LOCKFILE="" \
            RUBYOPT="-rbundler/setup" \
            ruby -e "require 'bundler'; puts 'Bundler.setup ok (no BUNDLE_LOCKFILE)'" || true
          echo "--- PRE-FLIGHT manual env replay (no BUNDLE_BIN_PATH) ---"
          BUNDLE_GEMFILE="$BUNDLE_GEMFILE" \
            BUNDLE_LOCKFILE="$BUNDLE_GEMFILE.lock" \
            RUBYOPT="-rbundler/setup" \
            ruby -e "require 'bundler'; puts 'Bundler.setup ok (no BUNDLE_BIN_PATH)'" || true
          bundle exec ${{ matrix.exec_cmd }}
